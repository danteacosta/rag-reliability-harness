# Optional local Postgres + pgvector demo (not used in CI).
services:
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_harness
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_harness"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:

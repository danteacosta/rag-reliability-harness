name: eval-gate
on:
  push:
  pull_request:
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: python -m ingest --mutable-version v2
      - run: python -m eval
      - run: python -m gates
